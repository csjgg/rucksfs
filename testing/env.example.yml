# =============================================================================
# RucksFS Automated Testing Configuration
# =============================================================================
# Copy this file to env.yml and fill in your values:
#   cp env.example.yml env.yml
#
# Then run:
#   task test
# =============================================================================

# Remote test host
remote:
  host: ""                              # Remote host IP or hostname (required)
  user: "root"                          # SSH user (needs root for FUSE)
  ssh_key: "~/.ssh/id_rsa"             # Path to SSH private key
  port: 22                              # SSH port

# RucksFS configuration
rucksfs:
  mountpoint: "/mnt/rucksfs"           # FUSE mount point on remote
  data_dir: "/var/lib/rucksfs"         # RocksDB + RawDisk data directory

# Benchmark configuration
benchmark:
  mode: "all"                           # "all", "correctness", "performance"
  num_files: 1000                       # Files per benchmark (B1-B9, C1-C7)
  num_dirs: 50                          # Directories for multi-dir tests (B2, B5)
  max_threads: 4                        # Max concurrency for stress tests (C1-C7)
  large_size_mb: 16                     # Large file size for I/O tests (T1-T2)
  small_count: 1000                     # Small files for pipeline test (T5)
  skip_pjdfstest: true                  # Skip pjdfstest (requires installation)

# Build configuration
build:
  # target: "x86_64-unknown-linux-gnu"  # Uncomment for cross-compilation
  # use_cross: false
