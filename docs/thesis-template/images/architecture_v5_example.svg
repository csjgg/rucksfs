<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="desc">
  <desc id="desc">RucksFS 系统架构示例图。保持上方 FUSE 客户端、下方 MDS/DS 三模块排布，更新为论文第三章和第四章对应内容。</desc>

  <defs>
    <style>
      .frame { fill: #ffffff; stroke: #b8b8b8; stroke-width: 1px; }
      .component {
        fill: #f6f6f6;
        stroke: #111111;
        stroke-width: 1.8px;
        rx: 8px;
      }
      .inner {
        fill: #ffffff;
        stroke: #111111;
        stroke-width: 1.4px;
        rx: 6px;
      }
      .inner-dark {
        fill: #e8e8e8;
        stroke: #111111;
        stroke-width: 1.4px;
        rx: 6px;
      }
      .chip {
        fill: #f3f4f6;
        stroke: #4b5563;
        stroke-width: 1px;
        rx: 5px;
      }
      .title, .mid, .small, .tiny {
        font-family: "Noto Sans CJK SC", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", "DejaVu Sans", Arial, sans-serif;
      }
      .title { font-size: 18px; font-weight: 700; fill: #111111; }
      .mid { font-size: 14px; fill: #111111; font-weight: 700; }
      .small { font-size: 13px; fill: #333333; }
      .tiny { font-size: 11px; fill: #555555; }
      .mono {
        font-family: "DejaVu Sans Mono", "JetBrains Mono", monospace;
        font-size: 11px;
        fill: #222222;
      }
      .arrow {
        fill: none;
        stroke: #111111;
        stroke-width: 1.9px;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arr);
      }
      .arrow-dash {
        fill: none;
        stroke: #111111;
        stroke-width: 1.7px;
        stroke-dasharray: 6 5;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arr);
      }
    </style>

    <marker id="arr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#111111" />
    </marker>
  </defs>

  <!-- 顶部入口 -->
  <rect x="300" y="20" width="400" height="32" class="inner-dark" />
  <text x="500" y="41" text-anchor="middle" class="small">用户应用 / Linux VFS</text>
  <path d="M500 52 V84" class="arrow" />

  <!-- FUSE 客户端 -->
  <rect x="300" y="86" width="400" height="96" class="component" />
  <text x="500" y="110" text-anchor="middle" class="title">FUSE 客户端</text>

  <rect x="324" y="120" width="110" height="28" class="inner" />
  <text x="379" y="139" text-anchor="middle" class="tiny">FUSE 协议层</text>

  <rect x="445" y="120" width="100" height="28" class="inner" />
  <text x="495" y="139" text-anchor="middle" class="tiny">文件操作路由</text>

  <rect x="556" y="120" width="120" height="28" class="inner" />
  <text x="616" y="139" text-anchor="middle" class="tiny">RPC 客户端</text>

  <rect x="324" y="156" width="352" height="20" class="inner-dark" />
  <text x="500" y="171" text-anchor="middle" class="small">多通道连接池</text>

  <!-- 客户端指向两个平面 -->
  <path d="M500 182 V206 H260 V242" class="arrow" />
  <path d="M500 182 V206 H740 V242" class="arrow" />

  <!-- MDS -->
  <rect x="50" y="242" width="420" height="270" class="component" />
  <text x="260" y="266" text-anchor="middle" class="title">MDS 元数据服务器</text>

  <rect x="72" y="278" width="376" height="28" class="inner" />
  <text x="260" y="297" text-anchor="middle" class="small">元数据服务（MetadataService）</text>

  <rect x="72" y="316" width="120" height="40" class="inner" />
  <text x="132" y="334" text-anchor="middle" class="small">命名空间</text>
  <text x="132" y="350" text-anchor="middle" class="small">操作实现</text>

  <rect x="200" y="316" width="120" height="40" class="inner" />
  <text x="260" y="334" text-anchor="middle" class="small">悲观事务</text>
  <text x="260" y="350" text-anchor="middle" class="small">并发控制</text>

  <rect x="328" y="316" width="120" height="40" class="inner" />
  <text x="388" y="334" text-anchor="middle" class="small">DeltaOp</text>
  <text x="388" y="350" text-anchor="middle" class="small">增量记录</text>

  <rect x="72" y="366" width="376" height="28" class="inner" />
  <text x="260" y="385" text-anchor="middle" class="small">后台折叠线程（DeltaCompactionWorker）</text>

  <rect x="72" y="404" width="376" height="88" class="inner-dark" />
  <text x="260" y="428" text-anchor="middle" class="mid">RocksDB（TransactionDB）</text>
  <text x="260" y="450" text-anchor="middle" class="small">WAL + 多列族</text>

  <rect x="82" y="458" width="82" height="22" class="chip" />
  <text x="123" y="473" text-anchor="middle" class="tiny">inodes</text>

  <rect x="174" y="458" width="82" height="22" class="chip" />
  <text x="215" y="473" text-anchor="middle" class="tiny">dir_entries</text>

  <rect x="266" y="458" width="82" height="22" class="chip" />
  <text x="307" y="473" text-anchor="middle" class="tiny">delta_entries</text>

  <rect x="358" y="458" width="82" height="22" class="chip" />
  <text x="399" y="473" text-anchor="middle" class="tiny">system</text>

  <!-- DS -->
  <rect x="530" y="242" width="420" height="270" class="component" />
  <text x="740" y="266" text-anchor="middle" class="title">DS 数据服务器</text>

  <rect x="552" y="278" width="376" height="28" class="inner" />
  <text x="740" y="297" text-anchor="middle" class="small">数据服务（DataService）</text>

  <rect x="552" y="314" width="120" height="62" class="inner" />
  <text x="612" y="340" text-anchor="middle" class="small">读写接口</text>
  <text x="612" y="360" text-anchor="middle" class="small">Read / Write</text>

  <rect x="680" y="314" width="120" height="62" class="inner" />
  <text x="740" y="340" text-anchor="middle" class="small">截断与删除</text>
  <text x="740" y="360" text-anchor="middle" class="small">Truncate / Delete</text>

  <rect x="808" y="314" width="120" height="62" class="inner" />
  <text x="868" y="340" text-anchor="middle" class="small">刷盘</text>
  <text x="868" y="360" text-anchor="middle" class="small">Flush</text>

  <rect x="552" y="384" width="376" height="118" class="inner-dark" />
  <text x="740" y="420" text-anchor="middle" class="mid" style="font-size:16px;">裸磁盘存储（data.raw）</text>
  <text x="740" y="444" text-anchor="middle" class="small">固定偏移映射 + 直接 I/O</text>
  <text x="740" y="466" text-anchor="middle" class="mono">inode × max_file_size + file_offset</text>

</svg>
