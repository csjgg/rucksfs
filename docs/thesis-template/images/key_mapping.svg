<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="400" viewBox="0 0 1000 400" role="img" aria-labelledby="desc">
  <desc id="desc">路径树到 RocksDB 键空间的映射示意。左侧为目录树结构，右侧为不同列族的键值对。</desc>

  <defs>
    <style>
      .frame { fill: #ffffff; stroke: none; }
      .tree-node {
        fill: #f0f0f0;
        stroke: #111111;
        stroke-width: 1.8px;
        rx: 8px;
      }
      .dir-kv {
        fill: #ffffff;
        stroke: #111111;
        stroke-width: 1.8px;
        rx: 6px;
      }
      .inode-kv {
        fill: #ffffff;
        stroke: #111111;
        stroke-width: 1.8px;
        stroke-dasharray: 8 5;
        rx: 6px;
      }
      .key-part {
        fill: #e8e8e8;
        stroke: #333333;
        stroke-width: 1.2px;
        rx: 4px;
      }
      .key-part-inode {
        fill: #f3f3f3;
        stroke: #333333;
        stroke-width: 1.2px;
        stroke-dasharray: 5 3;
        rx: 4px;
      }
      .val-part {
        fill: #fafafa;
        stroke: #999999;
        stroke-width: 1.2px;
        rx: 4px;
      }
      .title, .mid, .small, .tiny, .mono {
        font-family: "Noto Sans CJK SC", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", "DejaVu Sans", Arial, sans-serif;
      }
      .title { font-size: 18px; font-weight: 700; fill: #111111; }
      .mid { font-size: 16px; fill: #111111; }
      .small { font-size: 14px; fill: #333333; }
      .tiny { font-size: 12px; fill: #555555; }
      .mono {
        font-family: "DejaVu Sans Mono", "JetBrains Mono", "SF Mono", "Menlo", monospace;
        font-size: 13px;
        fill: #111111;
      }
      .arrow-dir {
        fill: none;
        stroke: #111111;
        stroke-width: 1.6px;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arr);
      }
      .arrow-inode {
        fill: none;
        stroke: #111111;
        stroke-width: 1.6px;
        stroke-dasharray: 6 4;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arr);
      }
      .tree-arrow {
        fill: none;
        stroke: #111111;
        stroke-width: 1.8px;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arr);
      }
    </style>

    <marker id="arr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#111111" />
    </marker>
  </defs>

  <rect x="5" y="5" width="990" height="390" class="frame" />

  <!-- ===== 左侧：目录树 ===== -->
  <text x="130" y="36" text-anchor="middle" class="title">目录树</text>

  <!-- root: top=50, bottom=110 -->
  <rect x="60" y="50" width="140" height="60" class="tree-node" />
  <text x="130" y="76" text-anchor="middle" class="mid">/</text>
  <text x="130" y="96" text-anchor="middle" class="tiny">inode 1</text>

  <!-- docs: top=190, bottom=250 -->
  <rect x="60" y="190" width="140" height="60" class="tree-node" />
  <text x="130" y="216" text-anchor="middle" class="mid">docs/</text>
  <text x="130" y="236" text-anchor="middle" class="tiny">inode 17</text>

  <!-- paper.tex: top=330, bottom=390 -->
  <rect x="60" y="330" width="140" height="60" class="tree-node" />
  <text x="130" y="356" text-anchor="middle" class="mid">paper.tex</text>
  <text x="130" y="376" text-anchor="middle" class="tiny">inode 42</text>

  <!-- 树边 root→docs: 从y=110到y=190，中点y=150 -->
  <path d="M130 110 V184" class="tree-arrow" />
  <!-- 树边 docs→paper: 从y=250到y=330，中点y=290 -->
  <path d="M130 250 V324" class="tree-arrow" />

  <!-- ===== 右侧：键值对 ===== -->
  <text x="660" y="36" text-anchor="middle" class="title">RocksDB 键空间</text>

  <!-- 5个KV均匀分布：top对齐50, bottom对齐390, 总高340, 5个KV高44, 间距=(340-5*44)/4=30 -->
  <!-- KV1: y=50..94 -->
  <!-- KV2: y=124..168 -->
  <!-- KV3: y=198..242 -->
  <!-- KV4: y=272..316 -->
  <!-- KV5: y=346..390 -->

  <!-- KV 1: inode:1 (虚线框, top=50 对齐 root top) -->
  <rect x="380" y="50" width="530" height="44" class="inode-kv" />
  <rect x="392" y="58" width="148" height="28" class="key-part-inode" />
  <text x="466" y="77" text-anchor="middle" class="mono">[I] [inode:1]</text>
  <rect x="552" y="58" width="346" height="28" class="val-part" />
  <text x="725" y="77" text-anchor="middle" class="mono">inode attrs of /</text>

  <!-- KV 2: dir entry docs (实线框, y=124) -->
  <rect x="380" y="124" width="530" height="44" class="dir-kv" />
  <rect x="392" y="132" width="268" height="28" class="key-part" />
  <text x="526" y="151" text-anchor="middle" class="mono">[D] [inode:1] ["docs"]</text>
  <rect x="672" y="132" width="226" height="28" class="val-part" />
  <text x="785" y="151" text-anchor="middle" class="mono">[inode:17] [DIR]</text>

  <!-- KV 3: inode:17 (虚线框, y=198, 对齐 docs 中心) -->
  <rect x="380" y="198" width="530" height="44" class="inode-kv" />
  <rect x="392" y="206" width="160" height="28" class="key-part-inode" />
  <text x="472" y="225" text-anchor="middle" class="mono">[I] [inode:17]</text>
  <rect x="564" y="206" width="334" height="28" class="val-part" />
  <text x="731" y="225" text-anchor="middle" class="mono">inode attrs of docs/</text>

  <!-- KV 4: dir entry paper.tex (实线框, y=272) -->
  <rect x="380" y="272" width="530" height="44" class="dir-kv" />
  <rect x="392" y="280" width="308" height="28" class="key-part" />
  <text x="546" y="299" text-anchor="middle" class="mono">[D] [inode:17] ["paper.tex"]</text>
  <rect x="712" y="280" width="186" height="28" class="val-part" />
  <text x="805" y="299" text-anchor="middle" class="mono">[inode:42] [REG]</text>

  <!-- KV 5: inode:42 (虚线框, y=346, bottom=390 对齐 paper bottom) -->
  <rect x="380" y="346" width="530" height="44" class="inode-kv" />
  <rect x="392" y="354" width="160" height="28" class="key-part-inode" />
  <text x="472" y="373" text-anchor="middle" class="mono">[I] [inode:42]</text>
  <rect x="564" y="354" width="334" height="28" class="val-part" />
  <text x="731" y="373" text-anchor="middle" class="mono">inode attrs of paper.tex</text>

  <!-- ===== 箭头 ===== -->

  <!-- root 节点 → inode:1 KV (虚线) -->
  <path d="M200 72 H374" class="arrow-inode" />

  <!-- 树边 root→docs 中点(y=150) → dir entry docs KV(y=146) (实线，从边上引出) -->
  <path d="M148 150 H374" class="arrow-dir" />

  <!-- docs 节点 → inode:17 KV (虚线) -->
  <path d="M200 220 H374" class="arrow-inode" />

  <!-- 树边 docs→paper 中点(y=290) → dir entry paper KV(y=294) (实线，从边上引出) -->
  <path d="M148 290 H374" class="arrow-dir" />

  <!-- paper 节点 → inode:42 KV (虚线) -->
  <path d="M200 368 H374" class="arrow-inode" />
</svg>
