<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="desc">
  <desc id="desc">RucksFS 系统架构图。展示 FUSE 客户端、元数据服务器(MDS)和数据服务器(DS)的内部结构及交互关系。</desc>

  <defs>
    <style>
      .frame { fill: #ffffff; stroke: #b8b8b8; stroke-width: 1px; }
      .component {
        fill: #f6f6f6;
        stroke: #111111;
        stroke-width: 1.8px;
        rx: 8px;
      }
      .inner {
        fill: #ffffff;
        stroke: #111111;
        stroke-width: 1.4px;
        rx: 6px;
      }
      .inner-dark {
        fill: #e8e8e8;
        stroke: #111111;
        stroke-width: 1.4px;
        rx: 6px;
      }
      .title, .mid, .small, .tiny, .label {
        font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      }
      .title { font-size: 19px; font-weight: 700; fill: #111111; }
      .mid { font-size: 15px; fill: #111111; font-weight: 700; }
      .small { font-size: 14px; fill: #333333; }
      .tiny { font-size: 12px; fill: #555555; }
      .label { font-size: 14px; fill: #333333; }
      .arrow {
        fill: none;
        stroke: #111111;
        stroke-width: 1.8px;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arr);
      }
    </style>

    <marker id="arr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#111111" />
    </marker>
  </defs>

  <rect x="5" y="5" width="990" height="550" class="frame" />

  <!-- ===== 顶部：用户层 ===== -->
  <rect x="300" y="20" width="400" height="32" class="inner-dark" />
  <text x="500" y="41" text-anchor="middle" class="small">用户应用 / VFS</text>

  <path d="M500 52 V66" class="arrow" />

  <!-- ===== FUSE 客户端 ===== -->
  <rect x="300" y="68" width="400" height="96" class="component" />
  <text x="500" y="92" text-anchor="middle" class="title">FUSE 客户端</text>

  <rect x="324" y="102" width="110" height="28" class="inner" />
  <text x="379" y="121" text-anchor="middle" class="small">FUSE 协议层</text>

  <rect x="445" y="102" width="100" height="28" class="inner" />
  <text x="495" y="121" text-anchor="middle" class="small">VFS Core</text>

  <rect x="556" y="102" width="120" height="28" class="inner" />
  <text x="616" y="121" text-anchor="middle" class="small">gRPC Client</text>

  <rect x="324" y="138" width="352" height="20" class="inner-dark" />
  <text x="500" y="153" text-anchor="middle" class="tiny">TLS 1.3 + Bearer Token</text>

  <!-- ===== 分叉箭头（加长） ===== -->
  <path d="M370 164 V230" class="arrow" />
  <path d="M630 164 V230" class="arrow" />

  <!-- 标注放在箭头外侧 -->
  <text x="260" y="192" text-anchor="middle" class="label">metadata RPC</text>
  <text x="740" y="192" text-anchor="middle" class="label">data RPC</text>

  <!-- 操作标注（外侧） -->
  <text x="220" y="216" text-anchor="middle" class="label">lookup / readdir / create / rename / unlink</text>
  <text x="755" y="216" text-anchor="middle" class="label">read / write / truncate / flush</text>

  <!-- ===== MDS 元数据服务器 ===== -->
  <rect x="50" y="242" width="420" height="270" class="component" />
  <text x="260" y="266" text-anchor="middle" class="title">MDS 元数据服务器</text>

  <!-- 顶层：gRPC -->
  <rect x="72" y="278" width="376" height="28" class="inner" />
  <text x="260" y="297" text-anchor="middle" class="small">MetadataService (gRPC)</text>

  <!-- 中间：核心模块横排 -->
  <rect x="72" y="316" width="118" height="40" class="inner" />
  <text x="131" y="334" text-anchor="middle" class="small">Delta</text>
  <text x="131" y="350" text-anchor="middle" class="small">懒折叠</text>

  <rect x="200" y="316" width="118" height="40" class="inner" />
  <text x="259" y="334" text-anchor="middle" class="small">Inode</text>
  <text x="259" y="350" text-anchor="middle" class="small">FoldedCache</text>

  <rect x="328" y="316" width="120" height="40" class="inner" />
  <text x="388" y="334" text-anchor="middle" class="small">WriteBatch</text>
  <text x="388" y="350" text-anchor="middle" class="small">事务</text>

  <!-- Compaction -->
  <rect x="72" y="366" width="376" height="28" class="inner" />
  <text x="260" y="385" text-anchor="middle" class="small">DeltaCompactionWorker</text>

  <!-- 底层：RocksDB -->
  <rect x="72" y="404" width="376" height="90" class="inner-dark" />
  <text x="260" y="430" text-anchor="middle" class="mid">RocksDB</text>
  <text x="260" y="454" text-anchor="middle" class="small">多列族存储</text>
  <text x="260" y="478" text-anchor="middle" class="tiny">inodes / dir_entries / delta_entries / allocator</text>

  <!-- ===== DS 数据服务器 ===== -->
  <rect x="530" y="242" width="420" height="270" class="component" />
  <text x="740" y="266" text-anchor="middle" class="title">DS 数据服务器</text>

  <!-- 顶层：gRPC -->
  <rect x="552" y="278" width="376" height="28" class="inner" />
  <text x="740" y="297" text-anchor="middle" class="small">DataService (gRPC)</text>

  <!-- 中间：操作模块横排 -->
  <rect x="552" y="316" width="108" height="40" class="inner" />
  <text x="606" y="341" text-anchor="middle" class="small">Read</text>

  <rect x="670" y="316" width="108" height="40" class="inner" />
  <text x="724" y="341" text-anchor="middle" class="small">Write</text>

  <rect x="788" y="316" width="140" height="40" class="inner" />
  <text x="858" y="334" text-anchor="middle" class="small">Truncate /</text>
  <text x="858" y="350" text-anchor="middle" class="small">Delete</text>

  <!-- 底层：RawDisk Store -->
  <rect x="552" y="366" width="376" height="128" class="inner-dark" />
  <text x="740" y="400" text-anchor="middle" class="mid">RawDisk Store</text>
  <text x="740" y="430" text-anchor="middle" class="small">基于 inode 的偏移寻址</text>
  <text x="740" y="458" text-anchor="middle" class="tiny">offset = inode × block_size + byte_offset</text>
  <text x="740" y="482" text-anchor="middle" class="tiny">直接磁盘 I/O</text>
</svg>
