# =============================================================================
# {{PROJECT_NAME}} Automated Testing Configuration
# =============================================================================
# Copy this file to env.yml and fill in your values:
#   cp env.example.yml env.yml
#
# Then run:
#   task test
# =============================================================================

# Remote test host
remote:
  host: ""                              # Remote host IP or hostname
  user: "root"                          # SSH user (needs root/sudo)
  ssh_key: "~/.ssh/id_rsa"             # Path to SSH private key
  port: 22                              # SSH port

# Bastion / Jump host (optional)
bastion:
  enabled: false                        # Set to true to use bastion
  host: ""                              # Bastion host IP
  user: "root"                          # Bastion SSH user
  ssh_key: "~/.ssh/id_rsa"             # SSH key for bastion
  port: 22                              # Bastion SSH port

# {{PROJECT_SPECIFIC_STORAGE}}
# Example:
# cfs:
#   mount_point: "/cfs/data"            # Pre-mounted storage path

# {{SERVICE_CONFIG}}
# Example:
# service:
#   root_dir: "/var/lib/my-service"
#   socket_path: "/run/my-service/my-service.sock"
#   log_level: "info"
#   config_path: "/etc/my-service/config.toml"

# Benchmark configuration
benchmark:
  mode: "{{DEFAULT_BENCH_MODE}}"        # Benchmark mode
  dataset: "{{DEFAULT_DATASET}}"        # Dataset file name
  rate: 1                               # Operations per second
  duration: 60                          # Duration in seconds
  namespace: "default"                  # Namespace (if applicable)

# Build configuration
build:
  # {{BUILD_CONFIG}}
  # Example:
  # target: "x86_64-unknown-linux-musl"
  # use_cross: false
