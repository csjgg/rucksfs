syntax = "proto3";

package rucksfs;

// File system attribute
message FileAttr {
  uint64 inode = 1;
  uint64 size = 2;
  uint32 mode = 3;
  uint32 uid = 4;
  uint32 gid = 5;
  uint64 atime = 6;
  uint64 mtime = 7;
  uint64 ctime = 8;
}

// File system statistics
message StatFs {
  uint64 blocks = 1;
  uint64 bfree = 2;
  uint64 bavail = 3;
  uint64 files = 4;
  uint64 ffree = 5;
  uint32 bsize = 6;
  uint32 namelen = 7;
}

// Directory entry
message DirEntry {
  string name = 1;
  uint64 inode = 2;
  uint32 kind = 3;
}

// Error response
message ErrorResponse {
  string message = 1;
  int32 code = 2;
}

// Lookup request
message LookupRequest {
  uint64 parent = 1;
  string name = 2;
}

// Getattr request
message GetattrRequest {
  uint64 inode = 1;
}

// Readdir request
message ReaddirRequest {
  uint64 inode = 1;
}

// Readdir response
message ReaddirResponse {
  repeated DirEntry entries = 1;
}

// Open request
message OpenRequest {
  uint64 inode = 1;
  uint32 flags = 2;
}

// Open response
message OpenResponse {
  uint64 handle = 1;
}

// Read request
message ReadRequest {
  uint64 inode = 1;
  uint64 offset = 2;
  uint32 size = 3;
}

// Read response
message ReadResponse {
  bytes data = 1;
}

// Write request
message WriteRequest {
  uint64 inode = 1;
  uint64 offset = 2;
  bytes data = 3;
  uint32 flags = 4;
}

// Write response
message WriteResponse {
  uint32 bytes_written = 1;
}

// Create request
message CreateRequest {
  uint64 parent = 1;
  string name = 2;
  uint32 mode = 3;
}

// Mkdir request
message MkdirRequest {
  uint64 parent = 1;
  string name = 2;
  uint32 mode = 3;
}

// Unlink request
message UnlinkRequest {
  uint64 parent = 1;
  string name = 2;
}

// Rmdir request
message RmdirRequest {
  uint64 parent = 1;
  string name = 2;
}

// Rename request
message RenameRequest {
  uint64 parent = 1;
  string name = 2;
  uint64 new_parent = 3;
  string new_name = 4;
}

// Setattr request
message SetattrRequest {
  uint64 inode = 1;
  FileAttr attr = 2;
}

// Statfs request
message StatfsRequest {
  uint64 inode = 1;
}

// Flush request
message FlushRequest {
  uint64 inode = 1;
}

// Fsync request
message FsyncRequest {
  uint64 inode = 1;
  bool datasync = 2;
}

// Empty response for operations that don't return data
message EmptyResponse {}

// The file system service
service FileSystemService {
  rpc Lookup(LookupRequest) returns (FileAttr);
  rpc Getattr(GetattrRequest) returns (FileAttr);
  rpc Readdir(ReaddirRequest) returns (ReaddirResponse);
  rpc Open(OpenRequest) returns (OpenResponse);
  rpc Read(ReadRequest) returns (ReadResponse);
  rpc Write(WriteRequest) returns (WriteResponse);
  rpc Create(CreateRequest) returns (FileAttr);
  rpc Mkdir(MkdirRequest) returns (FileAttr);
  rpc Unlink(UnlinkRequest) returns (EmptyResponse);
  rpc Rmdir(RmdirRequest) returns (EmptyResponse);
  rpc Rename(RenameRequest) returns (EmptyResponse);
  rpc Setattr(SetattrRequest) returns (FileAttr);
  rpc Statfs(StatfsRequest) returns (StatFs);
  rpc Flush(FlushRequest) returns (EmptyResponse);
  rpc Fsync(FsyncRequest) returns (EmptyResponse);
}
