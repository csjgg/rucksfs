syntax = "proto3";

package rucksfs.metadata;

// File system attribute (includes nlink)
message FileAttr {
  uint64 inode = 1;
  uint64 size = 2;
  uint32 mode = 3;
  uint32 nlink = 4;
  uint32 uid = 5;
  uint32 gid = 6;
  uint64 atime = 7;
  uint64 mtime = 8;
  uint64 ctime = 9;
}

// File system statistics
message StatFs {
  uint64 blocks = 1;
  uint64 bfree = 2;
  uint64 bavail = 3;
  uint64 files = 4;
  uint64 ffree = 5;
  uint32 bsize = 6;
  uint32 namelen = 7;
}

// Directory entry
message DirEntry {
  string name = 1;
  uint64 inode = 2;
  uint32 kind = 3;
}

// DataServer endpoint information
message DataLocation {
  string address = 1;
}

// Lookup
message LookupRequest {
  uint64 parent = 1;
  string name = 2;
}

// Getattr
message GetattrRequest {
  uint64 inode = 1;
}

// Readdir
message ReaddirRequest {
  uint64 inode = 1;
}
message ReaddirResponse {
  repeated DirEntry entries = 1;
}

// Create
message CreateRequest {
  uint64 parent = 1;
  string name = 2;
  uint32 mode = 3;
}

// Mkdir
message MkdirRequest {
  uint64 parent = 1;
  string name = 2;
  uint32 mode = 3;
}

// Unlink
message UnlinkRequest {
  uint64 parent = 1;
  string name = 2;
}

// Rmdir
message RmdirRequest {
  uint64 parent = 1;
  string name = 2;
}

// Rename
message RenameRequest {
  uint64 parent = 1;
  string name = 2;
  uint64 new_parent = 3;
  string new_name = 4;
}

// Setattr — uses optional fields to express "no change"
message SetAttrRequest {
  uint64 inode = 1;
  optional uint32 mode = 2;
  optional uint32 uid = 3;
  optional uint32 gid = 4;
  optional uint64 size = 5;
  optional uint64 atime = 6;
  optional uint64 mtime = 7;
}

// Statfs
message StatfsRequest {
  uint64 inode = 1;
}

// Open
message OpenRequest {
  uint64 inode = 1;
  uint32 flags = 2;
}
message OpenResponse {
  uint64 handle = 1;
  DataLocation data_location = 2;
}

// ReportWrite — client calls this after writing to DataServer
message ReportWriteRequest {
  uint64 inode = 1;
  uint64 new_size = 2;
  uint64 mtime = 3;
}

// Empty response
message EmptyResponse {}

// Metadata service — pure metadata operations
service MetadataService {
  rpc Lookup(LookupRequest) returns (FileAttr);
  rpc Getattr(GetattrRequest) returns (FileAttr);
  rpc Readdir(ReaddirRequest) returns (ReaddirResponse);
  rpc Create(CreateRequest) returns (FileAttr);
  rpc Mkdir(MkdirRequest) returns (FileAttr);
  rpc Unlink(UnlinkRequest) returns (EmptyResponse);
  rpc Rmdir(RmdirRequest) returns (EmptyResponse);
  rpc Rename(RenameRequest) returns (EmptyResponse);
  rpc Setattr(SetAttrRequest) returns (FileAttr);
  rpc Statfs(StatfsRequest) returns (StatFs);
  rpc Open(OpenRequest) returns (OpenResponse);
  rpc ReportWrite(ReportWriteRequest) returns (EmptyResponse);
}
